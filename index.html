<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>What Kind of Traveller Are You? | Journey & Bloom</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #FAF7F2;
  --linen: #F0EBE0;
  --sand: #D8CBAF;
  --terra: #B8715A;
  --moss: #7A8C6E;
  --brown: #2C1F10;
  --midbrown: #6B4E35;
  --white: #FDFBF7;
  --textdark: #1E140A;
  --textmid: #5A4230;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Jost',sans-serif; background:var(--cream); color:var(--textdark); min-height:100vh; }
.app { max-width:680px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; }

/* HEADER */
.hdr { padding:24px 28px 0; display:flex; align-items:center; gap:14px; }
.logo { font-family:'Cormorant Garamond',serif; font-size:13px; letter-spacing:0.2em; text-transform:uppercase; color:var(--textmid); white-space:nowrap; }
.logo em { font-style:italic; color:var(--terra); }
.hdr-line { flex:1; height:1px; background:var(--sand); }
.hdr-tag { font-size:9px; letter-spacing:0.25em; text-transform:uppercase; color:var(--textmid); opacity:0.6; white-space:nowrap; }

/* SCREENS */
.screen { display:none; flex:1; padding:36px 28px 56px; animation:up 0.4s ease both; }
.screen.active { display:flex; flex-direction:column; }
@keyframes up { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }

/* INTRO */
.eyebrow { font-size:9px; letter-spacing:0.3em; text-transform:uppercase; color:var(--terra); margin-bottom:16px; }
.title { font-family:'Cormorant Garamond',serif; font-size:clamp(38px,9vw,58px); font-weight:300; line-height:1.06; margin-bottom:18px; }
.title em { font-style:italic; color:var(--terra); }
.subtitle { font-family:'Cormorant Garamond',serif; font-size:16px; font-style:italic; font-weight:300; color:var(--textmid); margin-bottom:30px; line-height:1.6; }
.chips { display:flex; gap:20px; flex-wrap:wrap; margin-bottom:36px; }
.chip { font-size:9px; letter-spacing:0.18em; text-transform:uppercase; color:var(--textmid); opacity:0.75; display:flex; align-items:center; gap:7px; }
.chip::before { content:''; width:4px; height:4px; border-radius:50%; background:var(--terra); opacity:0.8; flex-shrink:0; }
.hero-img { width:100%; height:auto; max-height:340px; object-fit:contain; object-position:center center; border-radius:4px; margin-bottom:36px; display:block; }

/* BUTTONS */
.btn-p { display:inline-flex; align-items:center; gap:11px; background:var(--terra); color:var(--white); border:none; padding:16px 32px; font-family:'Jost',sans-serif; font-size:10px; font-weight:500; letter-spacing:0.24em; text-transform:uppercase; cursor:pointer; border-radius:2px; transition:all 0.2s; align-self:flex-start; }
.btn-p:hover { background:var(--brown); transform:translateY(-1px); }
.arr { transition:transform 0.2s; }
.btn-p:hover .arr { transform:translateX(4px); }

/* PROGRESS */
.prog-wrap { margin-bottom:40px; }
.prog-top { display:flex; justify-content:space-between; margin-bottom:9px; }
.prog-lbl { font-size:9px; letter-spacing:0.24em; text-transform:uppercase; color:var(--textmid); opacity:0.65; }
.prog-num { font-family:'Cormorant Garamond',serif; font-size:15px; color:var(--textmid); }
.prog-bg { width:100%; height:1px; background:var(--sand); }
.prog-fill { height:100%; background:var(--terra); transition:width 0.45s ease; }

/* QUESTION */
.q-num { font-size:9px; letter-spacing:0.28em; text-transform:uppercase; color:var(--terra); margin-bottom:11px; }
.q-text { font-family:'Cormorant Garamond',serif; font-size:clamp(22px,5vw,30px); font-weight:300; line-height:1.3; margin-bottom:28px; }
.q-text em { font-style:italic; }
.opts { display:grid; gap:9px; margin-bottom:32px; }
.opt { display:flex; align-items:flex-start; gap:13px; padding:16px 18px; background:var(--white); border:1px solid var(--sand); border-radius:2px; cursor:pointer; transition:all 0.18s; text-align:left; width:100%; }
.opt:hover { border-color:var(--terra); background:var(--linen); transform:translateX(2px); }
.opt.sel { border-color:var(--terra); background:var(--linen); border-left-width:3px; }
.opt-l { font-family:'Cormorant Garamond',serif; font-size:13px; font-style:italic; color:var(--terra); min-width:15px; margin-top:1px; }
.opt-t { font-size:13px; font-weight:300; line-height:1.55; color:var(--textdark); }

/* NAV */
.nav { display:flex; gap:10px; }
.btn-n { display:inline-flex; align-items:center; gap:10px; background:var(--terra); color:var(--white); border:none; padding:14px 26px; font-family:'Jost',sans-serif; font-size:10px; font-weight:500; letter-spacing:0.22em; text-transform:uppercase; cursor:pointer; border-radius:2px; opacity:0.3; pointer-events:none; transition:all 0.2s; }
.btn-n.on { opacity:1; pointer-events:all; }
.btn-n.on:hover { background:var(--brown); transform:translateY(-1px); }
.btn-b { background:none; border:1px solid var(--sand); padding:14px 18px; font-family:'Jost',sans-serif; font-size:10px; letter-spacing:0.16em; text-transform:uppercase; color:var(--textmid); cursor:pointer; border-radius:2px; transition:border-color 0.18s; }
.btn-b:hover { border-color:var(--midbrown); }

/* RESULT */
.r-badge { display:inline-flex; align-items:center; gap:8px; padding:6px 13px; border:1px solid var(--sand); border-radius:99px; font-size:9px; letter-spacing:0.22em; text-transform:uppercase; color:var(--textmid); margin-bottom:22px; }
.r-dot { width:5px; height:5px; border-radius:50%; background:var(--moss); }
.r-name { font-family:'Cormorant Garamond',serif; font-size:clamp(34px,8vw,50px); font-weight:300; line-height:1.08; margin-bottom:7px; }
.r-name em { font-style:italic; color:var(--terra); }
.r-tag { font-family:'Cormorant Garamond',serif; font-size:15px; font-style:italic; font-weight:300; color:var(--textmid); margin-bottom:24px; line-height:1.55; }
.r-desc { font-size:13px; font-weight:300; line-height:1.85; color:var(--textmid); border-left:2px solid var(--sand); padding-left:17px; margin-bottom:32px; }

/* PRODUCT */
.prod { background:var(--white); border:1px solid var(--sand); border-radius:4px; overflow:hidden; margin-bottom:24px; }
.prod-img { width:100%; height:240px; object-fit:cover; object-position:center; display:block; transition:transform 0.4s; }
.prod:hover .prod-img { transform:scale(1.02); }
.prod-body { padding:22px 24px 24px; }
.prod-lbl { font-size:9px; letter-spacing:0.28em; text-transform:uppercase; color:var(--terra); margin-bottom:7px; }
.prod-name { font-family:'Cormorant Garamond',serif; font-size:21px; font-weight:400; color:var(--textdark); margin-bottom:7px; line-height:1.2; }
.prod-desc { font-size:12px; font-weight:300; line-height:1.65; color:var(--textmid); margin-bottom:16px; }
.prod-foot { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; }
.prod-price { font-family:'Cormorant Garamond',serif; font-size:22px; color:var(--textdark); }
.btn-shop { display:inline-flex; align-items:center; gap:9px; background:var(--brown); color:var(--white); border:none; padding:12px 22px; font-family:'Jost',sans-serif; font-size:10px; font-weight:500; letter-spacing:0.2em; text-transform:uppercase; cursor:pointer; border-radius:2px; text-decoration:none; transition:all 0.2s; }
.btn-shop:hover { background:var(--terra); transform:translateY(-1px); }

/* SHARE */
.share { margin-bottom:24px; }
.share-lbl { font-size:9px; letter-spacing:0.22em; text-transform:uppercase; color:var(--textmid); opacity:0.65; margin-bottom:11px; }
.share-btns { display:flex; gap:9px; flex-wrap:wrap; }
.btn-share { display:inline-flex; align-items:center; gap:7px; padding:9px 15px; border:1px solid var(--sand); background:transparent; font-family:'Jost',sans-serif; font-size:9px; letter-spacing:0.18em; text-transform:uppercase; color:var(--textmid); cursor:pointer; border-radius:2px; transition:all 0.18s; }
.btn-share:hover { border-color:var(--terra); color:var(--terra); }
.retake-wrap { padding-top:18px; border-top:1px solid var(--sand); text-align:center; }
.btn-retake { background:none; border:none; font-family:'Jost',sans-serif; font-size:10px; letter-spacing:0.2em; text-transform:uppercase; color:var(--textmid); opacity:0.5; cursor:pointer; transition:opacity 0.18s; }
.btn-retake:hover { opacity:0.9; }

/* FOOTER */
.ftr { padding:16px 28px 24px; display:flex; justify-content:space-between; border-top:1px solid var(--sand); opacity:0.55; }
.ftr-t { font-size:9px; letter-spacing:0.12em; color:var(--textmid); }
.ftr-a { font-size:9px; letter-spacing:0.12em; color:var(--terra); text-decoration:none; }

@media(max-width:480px) {
  .screen { padding:28px 18px 48px; }
  .hdr { padding:18px 18px 0; }
  .ftr { padding:14px 18px 20px; }
  .hero-img { height:auto; max-height:260px; }
  .prod-img { height:200px; }
}
</style>
</head>

const Qs = [
  { text: "When you picture your <em>perfect trip</em>, what comes to mind first?", opts: [
    { t:"SW", x:"Wandering slowly through a new city with no agenda, letting the day unfold naturally" },
    { t:"IE", x:"A carefully planned itinerary — the best restaurants, galleries, and hidden gems" },
    { t:"DR", x:"A beautiful destination I've been dreaming about for months, felt before it's booked" },
    { t:"SW", x:"Somewhere I've never been, chosen almost on a whim" }
  ]},
  { text: "How do you feel in the <em>days before</em> a trip?", opts: [
    { t:"SW", x:"Quietly excited — I try not to over-plan so I can stay open to surprises" },
    { t:"IE", x:"Energised — already organising lists, downloading maps, checking the weather" },
    { t:"DR", x:"A little dreamy — I've been imagining this trip for weeks, the anticipation is everything" },
    { t:"IE", x:"Somewhere between giddy and anxious — I want to do everything right" }
  ]},
  { text: "On a free afternoon in a foreign city, you would most likely...", opts: [
    { t:"SW", x:"Find a café, order something local, and simply watch the world pass by" },
    { t:"IE", x:"Cross off must-sees from my curated list, then discover something unexpected nearby" },
    { t:"DR", x:"Photograph everything — light, doorways, market stalls, strangers laughing" },
    { t:"SW", x:"Ask a local for their favourite spot and go wherever they point" }
  ]},
  { text: "When you return home from a trip, what do you <em>reach for first?</em>", opts: [
    { t:"SW", x:"A notebook — I want to write down how I felt before the feeling fades" },
    { t:"IE", x:"My journal to debrief what worked and what I'd do differently next time" },
    { t:"DR", x:"My camera roll — I could spend hours going through everything I captured" },
    { t:"SW", x:"Nothing — the memories live in me, not on paper" }
  ]},
  { text: "Travel, for you, is primarily about...", opts: [
    { t:"SW", x:"The quiet moments — a sunrise, a good meal alone, being somewhere beautiful" },
    { t:"IE", x:"Making the most of every hour — coming home having truly experienced a place" },
    { t:"DR", x:"Expanding something inside me — travel changes how I see myself and the world" },
    { t:"IE", x:"Connection — with people, cultures, stories I'd never encounter at home" }
  ]},
  { text: "Your packing style could best be described as...", opts: [
    { t:"SW", x:"Light and considered — I take only what feels essential and intentional" },
    { t:"IE", x:"Thorough and organised — packing list, everything in its place, nothing forgotten" },
    { t:"DR", x:"Inspired but sometimes chaotic — I pack what feels right for who I want to be" },
    { t:"SW", x:"Relaxed — I always forget something, and somehow it's always fine" }
  ]},
  { text: "If you could only take <em>one thing</em> on every journey, it would be...", opts: [
    { t:"SW", x:"A beautiful journal to catch thoughts before they disappear" },
    { t:"IE", x:"A well-designed planner so nothing is left to chance" },
    { t:"DR", x:"A camera — travel without photographs feels only half-remembered" },
    { t:"SW", x:"An open mind and a good conversation starter" }
  ]}
];

const PERSONAS = {
  SW: {
    name:"Soul Wanderer",
    tag:"You travel slowly, feel deeply, and leave a piece of yourself in every place.",
    desc:"You don't rush. For you, travel is less about ticking boxes and more about genuine presence — the way afternoon light hits a cobblestone street, the sound of a language you find beautiful. You notice things others walk past. A journey isn't just a trip. It's a chapter.",
    prod:{ lbl:"Your perfect companion", name:"Classic Light Edition Travel Journal", desc:"Beautifully crafted for those who travel with intention. Guided prompts, space for reflection, and room to capture the moments that matter most.", price:"£37", url:"https://thejourneyandbloom.com/products/travel-journal-classic-light-mindful-travel-journal?variant=52147898024303", img:"journal" }
  },
  IE: {
    name:"Intentional Explorer",
    tag:"You plan with purpose, explore with curiosity, and leave nothing to regret.",
    desc:"You're the one your travel companions turn to for the best recommendation, the hidden restaurant, the most efficient route. You believe good planning creates space for better spontaneity. You arrive prepared, and leave deeply satisfied.",
    prod:{ lbl:"Made for you", name:"Complete Travel Set", desc:"Journal and Planner together — for the traveller who wants both the structure of a well-planned trip and the space to write it all down beautifully.", price:"£49", url:"https://thejourneyandbloom.com/products/the-travel-planner-journal-set", img:"planner_steel" }
  },
  DR: {
    name:"The Dreamer",
    tag:"You live for the anticipation as much as the destination.",
    desc:"Before the bags are packed, the trip has already begun for you. Travel is woven into your everyday — in the images you save, the places you whisper to yourself at work. Your journeys begin in the imagination and bloom into something real.",
    prod:{ lbl:"Dreamed for you", name:"Blush Dawn Travel Planner", desc:"Soft, considered, and made for dreamers. Plan your next adventure in a planner designed to feel as beautiful as the journeys you imagine.", price:"£25", url:"https://thejourneyandbloom.com/products/travel-planner-blush-dawn-edition?variant=52564037337455", img:"planner" }
  }
};

let cur=0, ans=[], sel=null;

function show(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const el=document.getElementById(id);
  el.classList.add('active');
  el.style.animation='none'; el.offsetHeight; el.style.animation='';
}

function startQuiz() { show('s-quiz'); renderQ(); }

function renderQ() {
  sel=null;
  const q=Qs[cur];
  document.getElementById('q-count').textContent=`${cur+1} / ${Qs.length}`;
  document.getElementById('prog').style.width=`${((cur+1)/Qs.length)*100}%`;
  const letters=['a','b','c','d'];
  document.getElementById('q-area').innerHTML=`
    <div class="q-num">Question ${cur+1}</div>
    <div class="q-text">${q.text}</div>
    <div class="opts">
      ${q.opts.map((o,i)=>`
        <button class="opt" onclick="pick(${i})" id="o${i}">
          <span class="opt-l">${letters[i]}.</span>
          <span class="opt-t">${o.x}</span>
        </button>`).join('')}
    </div>`;
  const nb=document.getElementById('btn-next');
  nb.classList.remove('on');
  nb.innerHTML=cur===Qs.length-1?'See my result →':'Continue →';
  document.getElementById('btn-back').style.display=cur===0?'none':'inline-flex';
}

function pick(i) {
  sel=i;
  document.querySelectorAll('.opt').forEach((el,idx)=>el.classList.toggle('sel',idx===i));
  document.getElementById('btn-next').classList.add('on');
}

function nextQ() {
  if(sel===null) return;
  ans[cur]=Qs[cur].opts[sel].t;
  if(cur<Qs.length-1){ cur++; renderQ(); } else showResult();
}

function goBack() { if(cur>0){ cur--; renderQ(); } }

function showResult() {
  const c={SW:0,IE:0,DR:0};
  ans.forEach(a=>c[a]++);
  const top=Object.keys(c).reduce((a,b)=>c[a]>=c[b]?a:b);
  const p=PERSONAS[top];
  const imgSrc=IMGS[p.prod.img];
  document.getElementById('r-content').innerHTML=`
    <div class="r-badge"><div class="r-dot"></div>Your travel soul</div>
    <h2 class="r-name">The<br><em>${p.name}</em></h2>
    <p class="r-tag">${p.tag}</p>
    <p class="r-desc">${p.desc}</p>
    <div class="prod">
      <img class="prod-img" src="${imgSrc}" alt="${p.prod.name}" />
      <div class="prod-body">
        <div class="prod-lbl">${p.prod.lbl}</div>
        <div class="prod-name">${p.prod.name}</div>
        <div class="prod-desc">${p.prod.desc}</div>
        <div class="prod-foot">
          <span class="prod-price">${p.prod.price}</span>
          <a class="btn-shop" href="${p.prod.url}" target="_blank">Shop now →</a>
        </div>
      </div>
    </div>
    <div class="share">
      <div class="share-lbl">Share your result</div>
      <div class="share-btns">
        <button class="btn-share" onclick="shareIG()">✦ Instagram</button>
        <button class="btn-share" onclick="copyLink()">⟳ Copy link</button>
      </div>
    </div>
    <div class="retake-wrap">
      <button class="btn-retake" onclick="reset()">Retake the quiz</button>
    </div>`;
  show('s-result');
}

function reset() { cur=0; ans=[]; sel=null; show('s-intro'); }
function copyLink() { navigator.clipboard.writeText(window.location.href).then(()=>alert('Link copied!')); }
function shareIG() { window.open('https://www.instagram.com/the.journey.and.bloom','_blank'); }
</script>
